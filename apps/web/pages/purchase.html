<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shadowwork Navigator - Purchase</title>

  <script src="/runtime-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      max-width: 720px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      margin: 12px 0;
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .muted {
      color: #666;
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
      cursor: pointer;
    }

    button[disabled] {
      opacity: .4;
      cursor: not-allowed;
    }

    .ok {
      color: #0a7a2f;
      font-weight: 600;
    }

    .ng {
      color: #b00020;
      font-weight: 600;
    }

    code {
      background: #f6f6f6;
      padding: 2px 6px;
      border-radius: 6px;
    }

    .btn-lite {
      background: #fff;
      color: #111;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>
  <h1>購入ページ（仮）</h1>

  <div class="card">
    <div class="muted">ログイン状態</div>
    <div id="memberBox" class="muted">checking...</div>
    <div style="height:8px"></div>
    <div class="row" id="loginRow" style="display:none;">
      <a id="loginLink" href="/index.html#login" class="btn-lite"
        style="display:inline-block;padding:10px 14px;border-radius:10px;border:1px solid #ccc;text-decoration:none;color:#111;background:#fff;">
        ログインページへ
      </a>
      <span class="muted">ログイン後に自動で支払い状況を確認します</span>
    </div>
  </div>

  <div class="card">
    <h2 style="margin-top:0;">手順</h2>
    <ol>
      <li>「決済ページへ」からStripeへ進む</li>
      <li>支払い後、このページに戻って「支払い確認」を押す</li>
      <li>支払い済みなら dashboard に進めます</li>
    </ol>

    <div style="height:8px"></div>

    <div class="row">
      <button id="goCheckoutBtn" type="button">決済ページへ</button>
      <button id="checkPaidBtn" type="button" class="btn-lite" disabled>支払い確認</button>
      <button id="toDashboardBtn" type="button" class="btn-lite" disabled>Dashboardへ</button>
    </div>

    <div style="height:10px"></div>
    <div id="status" class="muted">status: -</div>
  </div>

  <script type="module">
    import { API_BASE, getSupabaseUser } from "/lib/client.js";
    import { createPurchasePageController } from "/lib/purchase_page.js";
    const DEBUG_UI = false;

    // Checkout Session はAPIで生成してURLを受け取る（固定URLは不要）

    function dbg(...args) { if (DEBUG_UI) console.log(...args); }
    function dbgErr(...args) { if (DEBUG_UI) console.error(...args); }

    const $status = document.getElementById("status");
    const $goCheckoutBtn = document.getElementById("goCheckoutBtn");
    const $checkPaidBtn = document.getElementById("checkPaidBtn");
    const $toDashboardBtn = document.getElementById("toDashboardBtn");
    const $memberBox = document.getElementById("memberBox");
    const $loginRow = document.getElementById("loginRow");
    const $loginLink = document.getElementById("loginLink");

    async function apiPaid() {
      const url = `${API_BASE}/api/paid`;
      dbg("[api] paid ->", url);
      const res = await fetch(url, { credentials: "include" });
      const data = await res.json().catch(() => ({}));
      dbg("[api] paid <-", data);
      return { ok: res.ok, data };
    }

    async function apiCreateCheckoutSession() {
      const url = `${API_BASE}/api/checkout/session`;
      dbg("[api] checkout.session ->", url);
      const res = await fetch(url, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: "{}",
      });
      const data = await res.json().catch(() => ({}));
      dbg("[api] checkout.session <-", data);
      return { ok: res.ok, data };
    }

    async function getMemberAnyVersion() {
      try {
        const user = await getSupabaseUser();
        if (user) return { id: user.id, email: user.email || null };
      } catch (e) {
        dbgErr('[supabase] get user failed', e);
      }
      return null;
    }

    const controller = createPurchasePageController({
      elements: {
        status: $status,
        goCheckoutBtn: $goCheckoutBtn,
        checkPaidBtn: $checkPaidBtn,
        toDashboardBtn: $toDashboardBtn,
        memberBox: $memberBox,
        loginRow: $loginRow,
      },
      deps: {
        getSupabaseUser: getMemberAnyVersion,
        apiPaid,
        apiCreateCheckoutSession,
      },
      navigate: (url) => {
        location.href = url;
      },
    });

    $goCheckoutBtn.addEventListener("click", () => {
      controller.handleGoCheckout().catch((e) => {
        dbgErr(e);
        $status.className = "ng";
        $status.textContent = `status: checkout error ${String(e?.message || e)}`;
      });
    });

    $checkPaidBtn.addEventListener("click", () => {
      controller.handleCheckPaid().catch((e) => {
        dbgErr(e);
        $status.className = "ng";
        $status.textContent = `status: error ${String(e?.message || e)}`;
      });
    });

    $toDashboardBtn.addEventListener("click", () => {
      controller.handleToDashboard();
    });

    controller.boot().catch((e) => {
      dbgErr(e);
      $status.className = "ng";
      $status.textContent = `status: boot error ${String(e?.message || e)}`;
    });
  </script>
</body>

</html>
