<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Shadowwork (Members)</title>
  <script src="/runtime-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
</head>

<body>
  <h1>Shadowwork（会員ページ）</h1>

  <div id="debug-state"></div>

  <div>
    <textarea id="msg" rows="4" cols="50" placeholder="ここに入力"></textarea><br />
    <button id="send">送信</button>
    <button id="next">次へ</button>
  </div>

  <pre id="log"></pre>

  <script type="module">
    import { API_BASE, apiPaid, getSupabaseUser } from "/lib/client.js";
    import { encryptMessageContent } from "/lib/crypto.js";
    import { fetchKmsPublicKey, wrapRawKeyWithPublicKey } from "/lib/envelope.js";
    import { decryptThreadMessages } from "/lib/thread_messages.js";
    const DEBUG_UI = false; // true にするとUIにもJSONを出す

    const $log = document.getElementById("log");
    const $msg = document.getElementById("msg");
    const $debug = document.getElementById("debug-state");
    const $send = document.getElementById("send");
    const $next = document.getElementById("next");
    let kmsKeyCache = null;

    function dbgErr(...args) { if (DEBUG_UI) console.error(...args); }

    async function getMemberAnyVersion() {
      try {
        const user = await getSupabaseUser();
        if (user) return { id: user.id, email: user.email || null };
      } catch (e) {
        dbgErr('[supabase] get user failed', e);
      }
      return null;
    }

    function appendLine(text) {
      if ($log.textContent) $log.textContent += `\n\n`;
      $log.textContent += text;
    }

    function clearLog() {
      $log.textContent = "";
    }

    function renderDebug() {
      const t = window.__STATE__?.thread;
      if (!t) {
        $debug.textContent = "thread: null";
        return;
      }
      $debug.textContent =
        `STEP: ${t.step} / ` +
        `Q: ${t.question_no ?? "-"} / ` +
        `S: ${t.session_no ?? "-"}`;
    }

    async function fetchState() {
      const res = await fetch(`${API_BASE}/api/thread/state`, { method: "GET", credentials: "include" });
      const json = await res.json();
      console.log("[thread/state]", json);

      window.__STATE__ = {
        run: json.run ?? null,
        thread: json.thread ?? null,
        lastMessage: json.last_message ?? null,
      };
      renderDebug();
      return window.__STATE__;
    }

    // ===== 追加：thread/messages =====

    async function apiThreadMessages(threadId) {
      const res = await fetch(
        `${API_BASE}/api/thread/messages?thread_id=${encodeURIComponent(threadId)}`,
        { method: "GET", credentials: "include" }
      );
      const data = await res.json().catch(() => ({}));
      console.log("[thread/messages]", data);
      if (!res.ok || !data.ok) {
        throw new Error(data?.error || "thread/messages failed");
      }
      return data; // { ok, run, thread, messages }
    }

    function renderThreadMessagesToLog(messages) {
      clearLog();
      const msgs = messages || [];
      if (msgs.length === 0) {
        // 空でも「復元した」ことがわかるようにしたければここで案内を出してもOK
        // appendLine("（このスレッドの会話はまだありません）");
        return;
      }
      for (const m of msgs) {
        const role = m.role || "?";
        const content = m.content ?? "";
        if (role === "user") appendLine(`You: ${content}`);
        else if (role === "assistant") appendLine(`AI: ${content}`);
        else appendLine(`${role}: ${content}`);
      }
    }

    async function hydrateLogFromCurrentThread() {
      const t = window.__STATE__?.thread;
      if (!t?.id) return;
      const msgData = await apiThreadMessages(t.id);
      const decrypted = await decryptThreadMessages(msgData.messages || [], {
        apiBase: API_BASE,
        threadId: t.id,
      });
      renderThreadMessagesToLog(decrypted);
    }

    async function ensureThread() {
      const state = await fetchState();
      if (!state.run) {
        // 未開始：appの責務外なので dashboard に戻す
        location.href = "/dashboard.html";
        return null;
      }

      // run完走済みなら app の責務外なので dashboard に戻す
      if (state.run?.status === "completed") {
        location.href = "/dashboard.html";
        return null;
      }

      // 既に thread があるなら、その thread の messages を復元して返す
      if (state.thread) {
        try {
          await hydrateLogFromCurrentThread();
        } catch (e) {
          appendLine(`[ERROR] failed to load messages: ${String(e?.message || e)}`);
        }
        return state.thread;
      }

      // なければ作る
      const res = await fetch(`${API_BASE}/api/thread/start`, { method: "POST", credentials: "include" });
      const json = await res.json();
      console.log("[thread/start]", json);

      // thread/start が完走を返すケース（例：S30後）は即 dashboard
      // （API仕様：完走時に 400 + { ok:false, run:{status:"completed"}, thread:null } など）
      if (!res.ok || !json?.ok) {
        if (json?.run?.status === "completed") {
          location.href = "/dashboard.html";
          return null;
        }
        appendLine(`[ERROR] thread/start ${JSON.stringify(json)}`);
        return null;
      }

      // start 後に state 再取得
      await fetchState();

      // 新規でも messages を読み込み（基本空だけど、整合性のため）
      try {
        await hydrateLogFromCurrentThread();
      } catch (e) {
        appendLine(`[ERROR] failed to load messages: ${String(e?.message || e)}`);
      }

      // 新規スレッド開始時、履歴が空なら opener を最初のAI発話として表示
      if (typeof json?.opener === "string" && json.opener.trim() && !$log.textContent.trim()) {
        appendLine(`AI: ${json.opener.trim()}`);
      }

      return window.__STATE__.thread;
    }

    async function closeThread() {
      const res = await fetch(`${API_BASE}/api/thread/close`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: "{}",
      });
      const json = await res.json().catch(() => ({}));
      console.log("[thread/close]", json);
      if (!res.ok || !json.ok) {
        appendLine(`[ERROR] thread/close ${JSON.stringify(json)}`);
        return false;
      }
      return true;
    }

    function shouldCloseFromResponse(data) {
      if (data?.close_thread === true) return true;
      if (data?.thread?.status === "completed") return true;
      return false;
    }

    function createClientMessageId(prefix) {
      if (globalThis.crypto?.randomUUID) {
        return `${prefix}-${globalThis.crypto.randomUUID()}`;
      }
      return `${prefix}-${Date.now()}-${Math.floor(Math.random() * 1_000_000)}`;
    }

    async function getKmsKey() {
      if (kmsKeyCache) return kmsKeyCache;
      kmsKeyCache = await fetchKmsPublicKey({ apiBase: API_BASE });
      return kmsKeyCache;
    }

    async function storeEncryptedMessage({ role, content, threadId, clientMessageId }) {
      const encrypted = await encryptMessageContent(content);
      const kms = await getKmsKey();
      const wrapped = await wrapRawKeyWithPublicKey({
        rawKeyBase64: encrypted.rawKey,
        publicKeyPem: kms.publicKeyPem,
      });

      const payload = {
        role,
        thread_id: threadId,
        client_message_id: clientMessageId,
        ciphertext: encrypted.ciphertext,
        iv: encrypted.iv,
        alg: encrypted.alg,
        v: encrypted.v,
        kid: null,
        wrapped_key: wrapped.wrapped_key,
        wrapped_key_alg: wrapped.wrapped_key_alg,
        wrapped_key_kid: kms.kid,
      };

      const res = await fetch(`${API_BASE}/api/thread/message`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data?.ok) {
        throw new Error(data?.error || "thread/message failed");
      }

      return data;
    }

    async function requestAssistantReply(message) {
      const res = await fetch(`${API_BASE}/api/thread/chat`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data?.ok || typeof data?.reply !== "string") {
        throw new Error(data?.error || "thread/chat failed");
      }

      return data;
    }

    // === 起動時 ===
    // NOTE: dashboard から「続きから再開」で遷移したとき、
    // ブラウザの BFCache（戻る/進むキャッシュ）で app.html が復元されると、
    // DOMContentLoaded が発火せず “過去の表示のまま” になることがある。
    // そのため pageshow / visibilitychange でも必ず復元処理を走らせる。

    let __BOOT_PROMISE__ = null;

    async function ensureUserSession() {
      const member = await getMemberAnyVersion();
      if (!member) {
        location.href = "/index.html";
        return null;
      }
      const id = (member.id || member["id"] || "").trim();
      if (!id) {
        $debug.textContent = "member.id が取得できませんでした";
        return null;
      }
      return id;
    }

    async function boot() {
      if (__BOOT_PROMISE__) return __BOOT_PROMISE__;
      __BOOT_PROMISE__ = (async () => {
        try {
          const userId = await ensureUserSession();
          if (!userId) return;

          // paid gate: 未決済なら purchase に飛ばす
          const isPaid = await apiPaid();
          if (!isPaid) {
            location.href = "/purchase.html";
            return;
          }

          const res = await fetch(`${API_BASE}/api/thread/state`, { method: "GET", credentials: "include" });
          const st = await res.json();
          console.log("[thread/state:init]", st);

          if (!st?.run || st?.run?.status === "completed") {
            location.href = "/dashboard.html";
            return;
          }

          // run active のときだけスレッド確保へ（ここで復元も走る）
          await ensureThread();
        } catch (err) {
          console.error("[init] error", err);
          $debug.textContent = "init error (console見て)";
        } finally {
          __BOOT_PROMISE__ = null;
        }
      })();
      return __BOOT_PROMISE__;
    }

    document.addEventListener("DOMContentLoaded", () => {
      boot();
    });

    // BFCache 復元対策
    window.addEventListener("pageshow", () => {
      boot();
    });

    // タブ復帰対策
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") boot();
    });

    // === 次へ（手動で thread close）===
    $next.addEventListener("click", async () => {
      $next.disabled = true;
      try {
        appendLine("---- このスレッドを終了します ----");
        const ok = await closeThread();
        if (!ok) return;

        // 1thread=1page なので、ログをクリアして新スレッドに切り替え
        clearLog();
        await ensureThread(); // ←新スレッド作成 & そのスレッドのmessages復元（基本空）
        appendLine("（新しいスレッドを開始しました）");
        renderDebug();
      } catch (err) {
        console.error("[thread/close] error", err);
        appendLine(`[error] ${String(err)}`);
      } finally {
        $next.disabled = false;
      }
    });

    // === 送信 ===
    $send.addEventListener("click", async () => {
      const message = $msg.value.trim();
      if (!message) return;

      $send.disabled = true;

      try {
        const threadId = window.__STATE__?.thread?.id;
        if (!threadId) {
          throw new Error("active thread is missing");
        }

        appendLine(`You: ${message}`);

        const userStoreData = await storeEncryptedMessage({
          role: "user",
          content: message,
          threadId,
          clientMessageId: createClientMessageId("user"),
        });
        console.log("[thread/message:user]", userStoreData);
        if (DEBUG_UI) {
          appendLine(`[thread/message:user] ${JSON.stringify(userStoreData)}`);
        }

        const chatData = await requestAssistantReply(message);
        console.log("[thread/chat]", chatData);

        // AIの返答を会話形式で表示
        appendLine(`AI: ${chatData.reply ?? "(no reply)"}`);

        const assistantStoreData = await storeEncryptedMessage({
          role: "assistant",
          content: chatData.reply,
          threadId,
          clientMessageId: createClientMessageId("assistant"),
        });
        console.log("[thread/message:assistant]", assistantStoreData);
        if (DEBUG_UI) {
          appendLine(`[thread/message:assistant] ${JSON.stringify(assistantStoreData)}`);
        }

        if (!window.__STATE__) window.__STATE__ = {};
        if (chatData.thread) {
          window.__STATE__ = window.__STATE__ ?? {};
          window.__STATE__.thread = chatData.thread;
          renderDebug();
        }

        // close_thread なら thread を閉じて次スレッドへ
        if (shouldCloseFromResponse(chatData)) {
          appendLine("---- このスレッドを終了します ----");
          const ok = await closeThread();
          if (ok) {
            clearLog();
            await ensureThread();
            appendLine("（新しいスレッドを開始しました）");
            renderDebug();
          }
        }

        $msg.value = "";
      } catch (err) {
        console.error("[thread/message] error", err);
        appendLine(`[error] ${String(err)}`);
      } finally {
        $send.disabled = false;
      }
    });
  </script>
</body>

</html>
