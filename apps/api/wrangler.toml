name = "filix-shadowwork-api"
main = "src/worker.ts"
compatibility_date = "2026-01-02"

[env.staging.vars]
APP_ENV = "staging"
ALLOWED_ORIGINS = "https://shadowwork-navigator.com"
JWT_ISSUER = "shadowwork-navigator-api"
JWT_AUDIENCE = "shadowwork-navigator-web"
ACCESS_TOKEN_TTL_SECONDS = "900"
SUPABASE_URL="https://bekltsvemtvbjxwrqvxg.supabase.co"
SUPABASE_JWKS_URL="https://bekltsvemtvbjxwrqvxg.supabase.co/auth/v1/.well-known/jwks.json"
SUPABASE_ISSUER="https://bekltsvemtvbjxwrqvxg.supabase.co/auth/v1"
SUPABASE_AUDIENCE="authenticated"
# Qdrant vars are managed per environment in Cloudflare (vars/secrets).
# QDRANT_URL = "https://<cluster>.<region>.qdrant.cloud"
# QDRANT_COLLECTION = "<collection_name>"

[env.staging]
name = "filix-shadowwork-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "filix_shadowwork_stg"
database_id = "ee4ec2f0-4c30-4ded-9dca-4ff1a1339446"
[env.production.vars]
APP_ENV = "production"
ALLOWED_ORIGINS = "https://shadowwork-navigator.com"
JWT_ISSUER = "shadowwork-navigator-api"
JWT_AUDIENCE = "shadowwork-navigator-web"
ACCESS_TOKEN_TTL_SECONDS = "900"
SUPABASE_URL="https://bekltsvemtvbjxwrqvxg.supabase.co"
SUPABASE_JWKS_URL="https://bekltsvemtvbjxwrqvxg.supabase.co/auth/v1/.well-known/jwks.json"
SUPABASE_ISSUER="https://bekltsvemtvbjxwrqvxg.supabase.co/auth/v1"
SUPABASE_AUDIENCE="authenticated"
# Qdrant vars are managed per environment in Cloudflare (vars/secrets).
# QDRANT_URL = "https://<cluster>.<region>.qdrant.cloud"
# QDRANT_COLLECTION = "<collection_name>"

[env.production]
name = "filix-shadowwork-api"
workers_dev = true
preview_urls = true

[[env.production.routes]]
pattern = "api.shadowwork-navigator.com"
zone_name = "shadowwork-navigator.com"
custom_domain = true

[[env.production.d1_databases]]
binding = "DB"
database_name = "filix_shadowwork_prod"
database_id = "eafdb453-2d31-4b7f-b77b-4dedbb69db02"
