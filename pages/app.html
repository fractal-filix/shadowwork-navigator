<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Shadowwork (Members)</title>

    <!-- Memberstack Install Code（あなたの実際のコードに差し替え） -->

  </head>

  <body>
    <h1>Shadowwork（会員ページ）</h1>

    <div id="debug-state"></div>

    <div>
      <textarea id="msg" rows="4" cols="50" placeholder="ここに入力"></textarea><br />
      <button id="send">送信</button>
    </div>

    <pre id="log"></pre>

    <script>
      const API_BASE = "https://filix-shadowwork-api.xxxhideyoxxx.workers.dev";

      const $log = document.getElementById("log");
      const $msg = document.getElementById("msg");

      const USER_ID = "test";

      // === 起動時：thread/state 疎通確認 ===
      document.addEventListener("DOMContentLoaded", async () => {
        try {
          const res = await fetch(
            `${API_BASE}/api/thread/state?user_id=${encodeURIComponent(USER_ID)}`,
            { method: "GET" }
          );

          const json = await res.json();
          console.log("[thread/state]", json);

          window.__STATE__ = {
            thread: json.thread ?? null,
            lastMessage: json.last_message ?? null,
          };

          const $debug = document.getElementById("debug-state");

          if (!window.__STATE__.thread) {
            $debug.textContent = "thread: null (start を叩いて作成してね)";
            return;
          }

          const t = window.__STATE__.thread;

          $debug.textContent =
            `STEP: ${t.current_step} / ` +
            `Q: ${t.current_question_no} / ` +
            `S: ${t.current_session_no}`;
        } catch (err) {
          console.error("[thread/state] fetch error", err);
        }
      });

      document.getElementById("send").addEventListener("click", async () => {
        const answer = $msg.value.trim();
        if (!answer) return;

        $log.textContent += `\n\nYou: ${answer}`;

        const res = await fetch(`${API_BASE}/api/thread/answer`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user_id: USER_ID, answer }),
        });

        const data = await res.json().catch(() => ({}));
        $log.textContent += `\n\n[thread/answer] ${JSON.stringify(data)}`;
        $msg.value = "";
      });
    </script>
  </body>
</html>
