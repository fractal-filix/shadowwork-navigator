<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Shadowwork (Members)</title>
  </head>

  <body>
    <h1>Shadowwork（会員ページ）</h1>

    <div id="debug-state"></div>

    <div>
      <textarea id="msg" rows="4" cols="50" placeholder="ここに入力"></textarea><br />
      <button id="send">送信</button>
    </div>

    <pre id="log"></pre>

    <script>
      const API_BASE = "https://filix-shadowwork-api.xxxhideyoxxx.workers.dev";
      const USER_ID = "test";
      const DEBUG_UI = false; // true にするとUIにもJSONを出す

      const $log = document.getElementById("log");
      const $msg = document.getElementById("msg");
      const $debug = document.getElementById("debug-state");
      const $send = document.getElementById("send");

      function appendLine(text) {
        if ($log.textContent) $log.textContent += `\n\n`;
        $log.textContent += text;
      }

      function renderDebug() {
        const t = window.__STATE__?.thread;
        if (!t) {
          $debug.textContent = "thread: null";
          return;
        }
        $debug.textContent =
          `STEP: ${t.current_step} / ` +
          `Q: ${t.current_question_no} / ` +
          `S: ${t.current_session_no}`;
      }

      async function fetchState() {
        const res = await fetch(
          `${API_BASE}/api/thread/state?user_id=${encodeURIComponent(USER_ID)}`,
          { method: "GET" }
        );
        const json = await res.json();
        console.log("[thread/state]", json);

        window.__STATE__ = {
          thread: json.thread ?? null,
          lastMessage: json.last_message ?? null,
        };
        renderDebug();
        return window.__STATE__;
      }

      async function ensureThread() {
        const state = await fetchState();
        if (state.thread) return state.thread;

        // なければ作る
        const res = await fetch(
          `${API_BASE}/api/thread/start?user_id=${encodeURIComponent(USER_ID)}`,
          { method: "POST" }
        );
        const json = await res.json();
        console.log("[thread/start]", json);

        // start 後に state 再取得
        await fetchState();
        return window.__STATE__.thread;
      }

      // === 起動時 ===
      document.addEventListener("DOMContentLoaded", async () => {
        try {
          await ensureThread();
        } catch (err) {
          console.error("[init] error", err);
          $debug.textContent = "init error (console見て)";
        }
      });

      // === 送信 ===
      $send.addEventListener("click", async () => {
        const message = $msg.value.trim();
        if (!message) return;

        $send.disabled = true;

        try {
          appendLine(`You: ${message}`);

          const res = await fetch(`${API_BASE}/api/thread/message`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              user_id: USER_ID,
              message }),
          });

          const data = await res.json().catch(() => ({}));
          console.log("[thread/message]", data);
          if (DEBUG_UI) {
            appendLine(`[thread/message] ${JSON.stringify(data)}`);
          }

          if (!res.ok || !data.ok) {
            appendLine(`[ERROR] ${JSON.stringify(data)}`);
            return;
          }

          // AIの返答を会話形式で表示
          appendLine(`AI: ${data.reply ?? "(no reply)"}`);

          // レスポンスを state に反映（最小）
          if (window.__STATE__?.thread) {
            window.__STATE__.thread.current_step = data.current_step ?? window.__STATE__.thread.current_step;
            window.__STATE__.thread.current_question_no =
              data.current_question_no ?? window.__STATE__.thread.current_question_no;
            window.__STATE__.thread.current_session_no =
              data.current_session_no ?? window.__STATE__.thread.current_session_no;
            renderDebug();
          }

          $msg.value = "";
        } catch (err) {
          console.error("[thread/message] error", err);
          $log.textContent += `\n\n[error] ${String(err)}`;
          appendLine(`[error] ${String(err)}`);
        } finally {
          $send.disabled = false;
        }
      });
    </script>
  </body>
</html>
