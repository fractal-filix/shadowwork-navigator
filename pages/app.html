<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Shadowwork (Members)</title>

    <!-- Memberstack Install Code（あなたの実際のコードに差し替え） -->
    <!-- Memberstack は後で統合する（いったん疎通確認を優先） -->

    <script src="https://static.memberstack.com/scripts/v1/memberstack.js"></script>

      window.memberstack = window.memberstack || [];
      window.memberstack.push(["init", { publicKey: "pk_f4cf79925f5ae28222fa" }]);
    </script>
    -->
  </head>

  <body>
    <h1>Shadowwork（会員ページ）</h1>

    <div id="debug-state"></div>

    <div>
      <textarea id="msg" rows="4" cols="50" placeholder="ここに入力"></textarea><br />
      <button id="send">送信</button>
    </div>

    <pre id="log"></pre>

    <script>
      const API_URL = "https://filix-stripe-webhook.xxxhideyoxxx.workers.dev/api/shadowwork";

      const $log = document.getElementById("log");
      const $msg = document.getElementById("msg");

      // === 起動時：session/state 疎通確認 ===
      document.addEventListener("DOMContentLoaded", async () => {
        try {
          const res = await fetch(
            "https://filix-shadowwork-api.xxxhideyoxxx.workers.dev/api/session/state?user_id=test",
            {
              method: "GET",
              credentials: "include", // cookieベース想定の場合
            }
          );

          const json = await res.json();
          console.log("[session/state]", json);

          window.__STATE__ = {
            session: json.session ?? null,
            lastEntry: json.last_entry ?? null,
          };

          console.log("[state]", window.__STATE__);

          const $debug = document.getElementById("debug-state");
          $debug.textContent =
            `STEP: ${window.__STATE__.session.current_step} / ` +
            `INDEX: ${window.__STATE__.session.current_index}`;
        } catch (err) {
          console.error("[session/state] fetch error", err);
        }
      });

      document.getElementById("send").addEventListener("click", async () => {
        const message = $msg.value.trim();
        if (!message) return;

        $log.textContent += `\n\nYou: ${message}`;

        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const data = await res.json().catch(() => ({}));
        $log.textContent += `\n\nAI: ${data.reply ?? "(no reply)"}`;
        $msg.value = "";
      });
    </script>
  </body>
</html>
